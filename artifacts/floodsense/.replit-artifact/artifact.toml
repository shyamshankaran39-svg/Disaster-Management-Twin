kind = "web"
previewPath = "/"
title = "FloodSense AI"
version = "1.0.0"
id = "artifacts/floodsense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20612

[services.development]
run = "pnpm --filter @workspace/floodsense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/floodsense", "run", "build" ]
publicDir = "artifacts/floodsense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20612"
BASE_PATH = "/"
